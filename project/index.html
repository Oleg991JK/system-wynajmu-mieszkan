<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vindo - Log In</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="script.js"></script>
</head>
<body>
<header class="header">
<div class="logo-central">
    <img src="logosvg.svg" alt="Vindo Icon" class="logo-icon">
    <span class="logo-name">Vindo<span class="logo-com">.com</span></span>
</div>
</header>   

    <main class="login-container">
        <div class="login-box">
            <h1>Log In</h1>
            <p class="welcome-text">Welcome to <span>VINDO</span></p>
            
            <form class="login-form">
                <div class="input-group">
                    <input type="text" id="nameInput" placeholder="Name" required>
                </div>
                <div class="input-group">
                    <input type="text" id="surnameInput" placeholder="Surname" required>
                </div>
                <div class="input-group">
                    <input type="text" id="phoneInput" placeholder="Phone" required>
                </div>
                <div class="input-group">
                    <input type="email" id="emailInput" placeholder="Email" required>
                </div>
                <div class="input-group">
                    <input id="passwordInput" type="password" placeholder="password" required>
                </div>

                <a href="#" class="forgot-password">forgot password?</a>
                
                <div class="button-group">
                    <button id="btnLogin" type="submit" class="btn-login">Log In</button>
                    <button type="button" class="btn-signin">Sign In</button>
                </div>
            </form>
        </div>
    </main>
</body>
</html>
