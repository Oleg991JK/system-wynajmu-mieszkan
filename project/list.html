<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vindo - Search Results</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="data.js"></script>
    <script src="list.js"></script>
    <link rel="stylesheet" href="list-style.css">
</head>
<body class="results-page">

    <header class="header">
        <div class="logo" onclick="window.location.href='main.html'" style="cursor:pointer">
            <span class="logo-name">Vindo<span class="logo-com">.com</span></span>
        </div>
        <div class="header-right">
            <button class="btn-account" onclick="location.href='account.html'">Konto</button>
        </div>
    </header>

    <main class="results-container">
<aside class="sidebar">
    <h3>Filtry:</h3>
    
    <div class="filter-group">
        <div class="price-header">
            <label>Max cennik:</label>
            <span class="price-badge"><span id="priceVal">1000</span> PLN</span>
        </div>
        <input type="range" id="sidePrice" min="50" max="1000" value="1000" step="10">
        <div class="range-limits">
            <span>50</span>
            <span>1000+</span>
        </div>
    </div>

    <div class="filter-group">
        <label class="custom-checkbox">
            <input type="checkbox" id="filterSmoking">
            <span class="checkmark"></span>
            <span class="label-text"> można palić</span>
        </label>
        
        <label class="custom-checkbox">
            <input type="checkbox" id="filterPets">
            <span class="checkmark"></span>
            <span class="label-text"> można ze zwierzętami</span>
        </label>
    </div>
    
    <button class="btn-reset" id="resetFilters">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>
        zresetuj 
    </button>
</aside>

        <section class="listings-grid" id="listingsGrid">
            </section>
    </main>

    
</body>
</html>
